<!DOCTYPE html><html>
<head><title>ZEXI BOT ADMIN PANEL</title><style>

body{
background:#050505;
color:white;
font-family:Inter;
padding:20px;
}

h1{
margin-bottom:20px;
}

.stats{
display:flex;
gap:20px;
margin-bottom:30px;
}

.stat{
background:#111;
padding:20px;
border-radius:10px;
border:1px solid #222;
flex:1;
text-align:center;
}

.section{
margin-bottom:40px;
}

.card{
background:#111;
border:1px solid #222;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

input{
padding:8px;
background:#000;
border:1px solid #333;
color:white;
border-radius:6px;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
margin-left:5px;
}

.add{background:#22c55e;}
.minus{background:#ff3b3b;}
.approve{background:#e2dcc2;color:black;}
.history{background:#2563eb;color:white;}

</style></head><body><h1>ZEXI BOT ADMIN PANEL</h1><div class="stats"><div class="stat">
<h3>Total Users</h3>
<div id="totalUsers">0</div>
</div><div class="stat">
<h3>Online Users</h3>
<div id="onlineUsers">0</div>
</div></div><div class="section">
<h2>Users</h2>
<div id="users"></div>
</div><div class="section">
<h2>Payment Requests</h2>
<div id="payments"></div>
</div><div class="section">
<h2>User History</h2>
<div id="history"></div>
</div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
getDoc,
updateDoc,
addDoc,
query,
where
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyCvMVx_geWeeiNgw0ziSR80mvncHlOwKQY",
authDomain:"zexi-bot.firebaseapp.com",
projectId:"zexi-bot",
storageBucket:"zexi-bot.firebasestorage.app",
messagingSenderId:"245993811972",
appId:"1:245993811972:web:e25ed7ef03d118a4fd8551"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* LOAD USERS */

async function loadUsers(){

const snap = await getDocs(collection(db,"users"));

const container = document.getElementById("users");

container.innerHTML="";

let total=0;
let online=0;

snap.forEach((docSnap)=>{

total++

let user = docSnap.data();

if(user.online) online++

let div=document.createElement("div");

div.className="card";

div.innerHTML=`

<b>${user.email}</b><br>

UserID: ${docSnap.id}<br>

Wallet: ${user.wallet}<br>

Status: ${user.online ? "🟢 Online":"🔴 Offline"}

<br><br>

<input type="number" id="amount_${docSnap.id}" placeholder="credits">

<button class="add" onclick="addCredit('${docSnap.id}')">Add</button>

<button class="minus" onclick="minusCredit('${docSnap.id}')">Minus</button>

<button class="history" onclick="viewHistory('${docSnap.id}')">History</button>

`;

container.appendChild(div);

});

document.getElementById("totalUsers").innerText=total;

document.getElementById("onlineUsers").innerText=online;

}

/* ADD CREDIT */

window.addCredit = async function(userId){

let amount = Number(document.getElementById("amount_"+userId).value);

const ref = doc(db,"users",userId);

const snap = await getDoc(ref);

let wallet = snap.data().wallet || 0;

wallet += amount;

await updateDoc(ref,{wallet});

await addDoc(collection(db,"transactions"),{

userId:userId,
type:"admin_add",
amount:amount

});

alert("Credits Added");

loadUsers();

}

/* MINUS CREDIT */

window.minusCredit = async function(userId){

let amount = Number(document.getElementById("amount_"+userId).value);

const ref = doc(db,"users",userId);

const snap = await getDoc(ref);

let wallet = snap.data().wallet || 0;

wallet -= amount;

await updateDoc(ref,{wallet});

await addDoc(collection(db,"transactions"),{

userId:userId,
type:"admin_minus",
amount:amount

});

alert("Credits Deducted");

loadUsers();

}

/* LOAD PAYMENTS */

async function loadPayments(){

const snap = await getDocs(collection(db,"payments"));

const container = document.getElementById("payments");

container.innerHTML="";

snap.forEach((docSnap)=>{

let pay = docSnap.data();

let div=document.createElement("div");

div.className="card";

div.innerHTML=`

User: ${pay.email}<br>

Credits: ${pay.credits}<br>

Amount: ₹${pay.amount}<br>

UTR: ${pay.utr}<br>

Status: ${pay.status}

<br><br>

<button class="approve"

onclick="approve('${docSnap.id}','${pay.userId}',${pay.credits})">

Approve

</button>

`;

container.appendChild(div);

});

}

/* APPROVE PAYMENT */

window.approve = async function(paymentId,userId,credits){

const ref = doc(db,"users",userId);

const snap = await getDoc(ref);

let wallet = snap.data().wallet || 0;

wallet += credits;

await updateDoc(ref,{wallet});

await updateDoc(doc(db,"payments",paymentId),{

status:"approved"

});

await addDoc(collection(db,"transactions"),{

userId:userId,
type:"payment",
amount:credits

});

alert("Payment Approved");

loadUsers();
loadPayments();

}

/* USER HISTORY */

window.viewHistory = async function(userId){

const container = document.getElementById("history");

container.innerHTML="Loading...";

const q = query(

collection(db,"transactions"),

where("userId","==",userId)

);

const snap = await getDocs(q);

container.innerHTML="";

snap.forEach((docSnap)=>{

let t = docSnap.data();

let div=document.createElement("div");

div.className="card";

div.innerHTML=`

User: ${t.userId}<br>

Type: ${t.type}<br>

Amount: ${t.amount}

`;

container.appendChild(div);

});

}

loadUsers();
loadPayments();

</script></body>
</html>
