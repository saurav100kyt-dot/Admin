<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZEXI BOT ADMIN PANEL</title><style>

body{
background:#0a0a0a;
color:white;
font-family:Arial;
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
}

.stats{
display:flex;
gap:15px;
justify-content:center;
margin-bottom:25px;
flex-wrap:wrap;
}

.stat{
background:#111;
padding:15px;
border-radius:10px;
border:1px solid #222;
min-width:150px;
text-align:center;
}

.section{
margin-top:25px;
}

.card{
background:#111;
padding:15px;
border-radius:10px;
border:1px solid #222;
margin-bottom:10px;
}

button{
padding:6px 12px;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:6px;
}

.add{background:#16a34a;color:white}
.minus{background:#f59e0b;color:white}
.approve{background:#2563eb;color:white}
.delete{background:#dc2626;color:white}
.cancel{background:#ef4444;color:white}

input{
padding:6px;
border-radius:6px;
border:1px solid #333;
background:#000;
color:white;
margin-top:5px;
}

</style></head><body><h1>ZEXI BOT ADMIN PANEL</h1><div class="stats"><div class="stat">
Total Users
<br>
<span id="totalUsers">0</span>
</div><div class="stat">
Online Users
<br>
<span id="onlineUsers">0</span>
</div><div class="stat">
Total Revenue
<br>
<span id="totalRevenue">₹0</span>
</div></div><div class="section">
<h2>Users</h2>
<div id="users"></div>
</div><div class="section">
<h2>Payments</h2>
<div id="payments"></div>
</div><div class="section">
<h2>User History</h2>
<div id="history"></div>
</div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
getDoc,
updateDoc,
addDoc,
deleteDoc,
query,
where,
onSnapshot
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";


const firebaseConfig = {

apiKey:"AIzaSyCvMVx_geWeeiNgw0ziSR80mvncHlOwKQY",
authDomain:"zexi-bot.firebaseapp.com",
projectId:"zexi-bot",
storageBucket:"zexi-bot.firebasestorage.app",
messagingSenderId:"245993811972",
appId:"1:245993811972:web:e25ed7ef03d118a4fd8551"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);



/* LIVE USER MONITOR */

function monitorUsers(){

const usersRef = collection(db,"users");

onSnapshot(usersRef,(snapshot)=>{

let totalUsers = 0;
let onlineUsers = 0;

snapshot.forEach((doc)=>{

totalUsers++;

if(doc.data().online){
onlineUsers++;
}

});

document.getElementById("totalUsers").innerText = totalUsers;
document.getElementById("onlineUsers").innerText = onlineUsers;

});

}



/* TOTAL REVENUE */

async function loadRevenue(){

const snap = await getDocs(collection(db,"payments"));

let revenue = 0;

snap.forEach((doc)=>{

const data = doc.data();

if(data.status === "approved"){
revenue += Number(data.amount || 0);
}

});

document.getElementById("totalRevenue").innerText="₹"+revenue;

}



/* LOAD USERS */

async function loadUsers(){

const snap = await getDocs(collection(db,"users"));

const container = document.getElementById("users");

container.innerHTML="";

snap.forEach((docSnap)=>{

let user = docSnap.data();

let div=document.createElement("div");

div.className="card";

div.innerHTML=`

<b>${user.email}</b><br>

UserID: ${docSnap.id}<br>

Wallet: ${user.wallet || 0}

<br><br>

<input type="number" id="amount_${docSnap.id}" placeholder="credits">

<br>

<button class="add" onclick="addCredit('${docSnap.id}')">Add</button>

<button class="minus" onclick="minusCredit('${docSnap.id}')">Minus</button>

<button class="delete" onclick="deleteUser('${docSnap.id}')">Delete</button>

<button class="approve" onclick="viewHistory('${docSnap.id}')">History</button>

`;

container.appendChild(div);

});

}



/* ADD CREDIT */

window.addCredit = async function(userId){

let amount = Number(document.getElementById("amount_"+userId).value);

const ref = doc(db,"users",userId);

const snap = await getDoc(ref);

let wallet = snap.data().wallet || 0;

wallet += amount;

await updateDoc(ref,{wallet});

await addDoc(collection(db,"transactions"),{

userId:userId,
type:"admin_add",
amount:amount

});

alert("Credits Added");

loadUsers();

}



/* MINUS CREDIT */

window.minusCredit = async function(userId){

let amount = Number(document.getElementById("amount_"+userId).value);

const ref = doc(db,"users",userId);

const snap = await getDoc(ref);

let wallet = snap.data().wallet || 0;

wallet -= amount;

await updateDoc(ref,{wallet});

await addDoc(collection(db,"transactions"),{

userId:userId,
type:"admin_minus",
amount:amount

});

alert("Credits Deducted");

loadUsers();

}



/* DELETE USER */

window.deleteUser = async function(userId){

if(!confirm("Delete user?")) return;

await deleteDoc(doc(db,"users",userId));

alert("User Deleted");

loadUsers();

}



/* LOAD PAYMENTS */

async function loadPayments(){

const snap = await getDocs(collection(db,"payments"));

const container = document.getElementById("payments");

container.innerHTML="";

snap.forEach((docSnap)=>{

let pay = docSnap.data();

let div=document.createElement("div");

div.className="card";

div.innerHTML=`

User: ${pay.email}<br>

Credits: ${pay.credits}<br>

Amount: ₹${pay.amount}<br>

UTR: ${pay.utr}<br>

Status: ${pay.status}

<br>

<button class="approve"
onclick="approve('${docSnap.id}','${pay.userId}',${pay.credits})">
Approve
</button>

<button class="cancel"
onclick="cancelPayment('${docSnap.id}')">
Cancel
</button>

`;

container.appendChild(div);

});

}



/* APPROVE PAYMENT */

window.approve = async function(paymentId,userId,credits){

const ref = doc(db,"users",userId);

const snap = await getDoc(ref);

let wallet = snap.data().wallet || 0;

wallet += credits;

await updateDoc(ref,{wallet});

await updateDoc(doc(db,"payments",paymentId),{
status:"approved"
});

await addDoc(collection(db,"transactions"),{

userId:userId,
type:"payment",
amount:credits

});

alert("Payment Approved");

loadUsers();
loadPayments();
loadRevenue();

}



/* CANCEL PAYMENT */

window.cancelPayment = async function(paymentId){

await updateDoc(doc(db,"payments",paymentId),{
status:"cancelled"
});

alert("Payment Cancelled");

loadPayments();

}



/* USER HISTORY */

window.viewHistory = async function(userId){

const container = document.getElementById("history");

container.innerHTML="Loading...";

const q = query(
collection(db,"transactions"),
where("userId","==",userId)
);

const snap = await getDocs(q);

container.innerHTML="";

snap.forEach((docSnap)=>{

let t = docSnap.data();

let div=document.createElement("div");

div.className="card";

div.innerHTML=`

User: ${t.userId}<br>
Type: ${t.type}<br>
Amount: ${t.amount}

`;

container.appendChild(div);

});

}



/* INITIAL LOAD */

monitorUsers();
loadUsers();
loadPayments();
loadRevenue();

</script></body>
</html>
